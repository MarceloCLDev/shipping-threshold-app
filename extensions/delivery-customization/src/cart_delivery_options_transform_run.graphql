query RunInput {
  cart {
    attribute(key: "shipping_test_variant") {
      value
    }
    deliveryGroups {
      deliveryOptions {
        handle
        title
        cost {
          amount
          currencyCode
        }
      }
    }
  }
  shop {
    metafield(namespace: "shipping_threshold_split_test", key: "config") {
      value
    }
  }
}